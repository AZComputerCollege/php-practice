<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport"
		  content="width=device-width, initial-scale=1.0">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
		  rel="stylesheet"
		  integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
		  crossorigin="anonymous">
	<title>Document</title>
</head>

<body>
	<div class="container">
		<h1 class="text-center my-3 text-primary fw-bold">Product CRUD</h1>
		<div class="d-flex justify-content-end my-4 mx-2">
			<button class="btn btn-primary"
					data-bs-toggle="modal"
					data-bs-target="#productModal">
				Create
			</button>
		</div>
		<div class="table-responsive">
			<table class="table">
				<thead>
					<tr>
						<th>Image</th>
						<th>Category</th>
						<th>Subcategory</th>
						<th>Product</th>
						<th>Qty</th>
						<th>Description</th>
						<th>Purchase Price</th>
						<th>Sale Price</th>
						<th>Tax</th>
						<th>Status</th>
						<th>Actions</th>
					</tr>
				</thead>

				<tbody id="product-body">

				</tbody>
			</table>

		</div>
	</div>




	<!-- Modals -->
	<div class="modal fade"
		 id="productModal"
		 tabindex="-1"
		 aria-labelledby="productModalLabel"
		 aria-hidden="true">
		<div class="modal-dialog">
			<div class="modal-content">
				<div class="modal-header">
					<h1 class="modal-title fs-5"
						id="productModalLabel">Create Product</h1>
					<button type="button"
							class="btn-close"
							data-bs-dismiss="modal"
							aria-label="Close"></button>
				</div>
				<div class="modal-body">
					<form id="productForm">
						<div class="mb-3">
							<label for="category"
								   class="col-form-label">Category:</label>
							<select name="category"
									id="productCats"
									class="form-select">
							</select>
						</div>
						<div class="mb-3">
							<label for="subcategory"
								   class="col-form-label">Subcategory:</label>
							<select name="subcategory"
									id="productSubcats"
									class="form-select">
							</select>
						</div>

						<div class="mb-3">
							<label for="">Product Name</label>
							<input type="text"
								   name="pname"
								   id="pname"
								   class="form-control">
						</div>
						<div class="mb-3">
							<label for="description"
								   class="col-form-label">Description:</label>
							<textarea class="form-control"
									  name="pdescription"
									  id="pdescription"></textarea>
						</div>

						<div class="mb-3">
							<label for="">Purchase Price</label>
							<input type="text"
								   name="p_price"
								   id="p_price"
								   class="form-control">
						</div>

						<div class="mb-3">
							<label for="">Sale Price</label>
							<input type="text"
								   name="s_price"
								   id="s_price"
								   class="form-control">
						</div>

						<div class="mb-3">
							<label for="">Tax (%)</label>
							<input type="text"
								   name="tax"
								   id="tax"
								   class="form-control">
						</div>

						<div class="mb-3">
							<label for="">QTY</label>
							<input type="number"
								   max="100"
								   min="0"
								   name="qty"
								   id="qty"
								   class="form-control">
						</div>

						<div class="mb-3">
							<label for="">Thumbnail</label>
							<input type="file"
								   name="thumbnail"
								   id="thumbnail"
								   class="form-control">
						</div>



					</form>
				</div>
				<div class="modal-footer">
					<button type="button"
							class="btn btn-secondary"
							data-bs-dismiss="modal">Close</button>
					<button type="button" id="psubmit"
							class="btn btn-primary">Submit</button>
				</div>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"
			integrity="sha384-oBqDVmMz9ATKxIep9tiCxS/Z9fNfEXiDAYTujMAeBAsjFuCZSmKbSSUnQlmh/jp3"
			crossorigin="anonymous"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.min.js"
			integrity="sha384-cuYeSxntonz0PPNlHhBs68uyIAVpIIOZZ5JqeqvYYIcEL727kskC66kF92t6Xl2V"
			crossorigin="anonymous"></script>

	<script src="https://code.jquery.com/jquery-3.7.1.js"
			integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4="
			crossorigin="anonymous"></script>

	<script src="https://php-classes.test/2_CRUD_AJAX/script.js"></script>
</body>

</html>
